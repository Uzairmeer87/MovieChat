version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moviechat_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:

      - PORT=5000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:

        - VITE_API_URL=https://moviechat-backend.onrender.com/api
    container_name: moviechat_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
